# Change these first
owner: jpwahle # Your GitHub organization or username, where this repository lives
repo: uptime # The name of this repository

sites:
  - name: Conference Deadlines
    url: https://www.conferencedeadlines.com/
  - name: AI Cards
    url: https://ai-cards.org/
  - name: CiteAssist
    url: https://citeassist.uni-goettingen.de/
  - name: Check My Thesis
    url: https://checkmythesis.com/
  - name: WK Solutions
    url: https://wksolutions.de/
  - name: Apple Mail AI Plugin
    url: https://jpwahle.github.io/apple-mail-ai-plugin/
  - name: Check My Thesis Supabase
    url: https://supabase.checkmythesis.com/
    expectedStatusCodes:
      - 200
      - 401
  - name: Check My Thesis API
    url: https://api.checkmythesis.com/health
  - name: Discord Emailbot
    url: https://emailbotstats.larskaesberg.de
    expectedStatusCodes:
      - 200
      - 404
  - name: AI Mensa App
    url: https://mensa.larskaesberg.de

# Downtime notifications: Upptime opens a GitHub issue when a site goes down
# and assigns it to these users. GitHub then emails each assignee at the
# address configured on their GitHub account.
assignees:
  - jpwahle
  - lkaesberg

status-website:
  # Hosted on GitHub Pages at https://jpwahle.github.io/uptime/, so no custom
  # domain (`cname`) — use `baseUrl` matching the repo name instead.
  baseUrl: /uptime
  cname: jpwahle.github.io
  logoUrl: https://raw.githubusercontent.com/upptime/upptime.js.org/master/static/img/icon.svg
  name: Jan Philip Wahle and Lars Kaesberg — Status
  introTitle: "**Status page** for services maintained by Jan Philip Wahle and Lars Kaesberg."
  introMessage: Real-time uptime and response-time data for services we maintain, powered by [Upptime](https://github.com/upptime/upptime) and hosted entirely on GitHub Actions, Issues, and Pages.
  navbar:
    - title: Status
      href: /
    - title: GitHub
      href: https://github.com/$OWNER/$REPO

# Upptime also supports notifications, assigning issues, and more
# See https://upptime.js.org/docs/configuration
